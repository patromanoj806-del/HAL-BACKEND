# ===== HAL Guest House - Railway Production Config =====

# Database Configuration (Set via Railway Variables - DO NOT hardcode here)
# spring.datasource.url, username, password come from Railway environment variables

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# Jackson Fix
spring.jackson.serialization.fail-on-empty-beans=false

# Server Port - Railway requires this exact format
server.port=${PORT:8080}

# CORS - Allow frontend from anywhere
spring.mvc.cors.allowed-origins=*

spring.application.name=hal-guesthouse
