# ===== HAL Guest House Management System =====
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hal_guesthouse?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=sibu@098@

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Server Port
server.port=8080

# CORS - Allow frontend
spring.mvc.cors.allowed-origins=*

# App Name
spring.application.name=hal-guesthouse

# Fix Jackson serialization of Hibernate proxies
spring.jpa.open-in-view=false
spring.jackson.serialization.fail-on-empty-beans=false
